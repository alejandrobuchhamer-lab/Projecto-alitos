<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>ALITOS POS</title>
  <link rel="manifest" href="/static/pos-manifest.json"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #070A12;
      --surface: #0f1117;
      --border: #1e2130;
      --text: #f8f8fa;
      --text-dim: #8890a4;
      --gold: #F5C230;
      --gold-dim: #C47820;
      --danger: #ff6b6b;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    html, body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* Grid puntitos */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(196,120,32,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none; z-index: 0;
    }

    /* Glow ambiental dorado */
    body::after {
      content: '';
      position: fixed;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,194,48,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 0;
      animation: ambientGlow 6s ease-in-out infinite;
    }

    @keyframes ambientGlow {
      0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.15); }
    }

    /* Card */
    .login-box {
      width: 100%; max-width: 340px; padding: 36px 28px;
      background: rgba(15,17,23,0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(245,194,48,0.06);
      position: relative; z-index: 10;
      animation: cardEntrance 0.5s cubic-bezier(0.34,1.4,0.64,1);
      transition: transform 0.5s ease, opacity 0.4s ease, filter 0.4s ease;
      margin: 20px;
    }

    @keyframes cardEntrance {
      from { opacity:0; transform:translateY(28px) scale(0.96); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }

    .portal-launching .login-box {
      transform: scale(0.88) translateY(20px);
      opacity: 0; filter: blur(6px);
    }

    /* Logo */
    .login-logo { text-align:center; margin-bottom:28px; }

    .login-logo-img {
      width: 64px; height: 64px; object-fit: contain;
      display: block; margin: 0 auto 12px;
      filter: drop-shadow(0 0 14px rgba(245,194,48,0.4));
      animation: logoFloat 3.5s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50%       { transform: translateY(-6px) rotate(1deg); }
    }

    .login-brand {
      font-size: 1.5rem; font-weight: 700;
      color: var(--gold); letter-spacing: 4px;
      display: block; margin-bottom: 4px;
    }

    .login-sub {
      font-size: 0.6rem; color: var(--text-dim);
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    /* Inputs */
    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block; font-size: 0.65rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-dim); margin-bottom: 6px;
    }

    .form-control {
      width: 100%; padding: 11px 12px;
      background: rgba(30,33,48,0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text); font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px rgba(245,194,48,0.1);
    }

    /* Botón */
    .btn-login {
      width: 100%; margin-top: 6px; padding: 12px;
      font-size: 0.88rem; font-weight: 700; letter-spacing: 0.3px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
      color: #0a0a0a;
      border: none; border-radius: 8px;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 20px rgba(245,194,48,0.25);
      transition: all 0.18s ease;
      position: relative; overflow: hidden;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(245,194,48,0.35);
    }

    .btn-login:active { transform: translateY(0); }

    /* Error */
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: #F87171; border-radius: 8px; padding: 10px 14px;
      font-size: 0.8rem; margin-bottom: 16px;
      display: none; animation: shakeIn 0.4s ease;
    }

    .error-msg.show { display: block; }

    @keyframes shakeIn {
      0%, 100% { transform: translateX(0); }
      20%, 60%  { transform: translateX(-5px); }
      40%, 80%  { transform: translateX(5px); }
    }

    .login-footer {
      text-align: center; margin-top: 24px;
      font-size: 0.6rem; color: #3a3f52; letter-spacing: 0.5px;
    }

    /* ═══════════════════════════════════
       BURBUJA DORADA — misma que ALITOS
    ═══════════════════════════════════ */
    #bubble-overlay {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
    }

    #bubble-overlay.active { pointer-events: all; }

    .bubble-bg {
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 48%,
        #F5C230 0%, #C47820 12%, #1a1208 35%, #070A12 80%
      );
      clip-path: circle(0% at 50% 48%);
      transition: clip-path 0.9s cubic-bezier(0.55,0,0.1,1);
    }

    #bubble-overlay.active .bubble-bg {
      clip-path: circle(180% at 50% 48%);
    }

    .bubble-flash {
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 48%, rgba(245,194,48,0.9) 0%, transparent 45%);
      opacity: 0; transition: opacity 0.15s ease;
    }

    #bubble-overlay.active .bubble-flash { opacity: 1; }

    .bubble-ring {
      position: relative; z-index: 5;
      width: 110px; height: 110px; border-radius: 50%;
      border: 1px solid rgba(245,194,48,0.5);
      box-shadow: 0 0 24px rgba(245,194,48,0.2), inset 0 0 16px rgba(245,194,48,0.05);
      display: flex; align-items: center; justify-content: center;
      transform: scale(0.6); opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease;
    }

    #bubble-overlay.active .bubble-ring { transform: scale(1); opacity: 1; }

    .bubble-ring.pop { animation: ringPop 0.35s ease-out forwards; }

    @keyframes ringPop {
      0%   { transform: scale(1); opacity: 1; border-width: 1px; }
      50%  { transform: scale(2.2); opacity: 0.4; border-width: 0.5px;
             box-shadow: 0 0 60px rgba(245,194,48,0.4), 0 0 120px rgba(245,194,48,0.2); }
      100% { transform: scale(3.5); opacity: 0; border-width: 0; }
    }

    .bubble-logo {
      width: 64px; height: 64px; object-fit: contain;
      filter: drop-shadow(0 0 12px rgba(245,194,48,0.6)) brightness(1.1);
      animation: bubbleLogoSpin 0.6s ease-out forwards;
    }

    @keyframes bubbleLogoSpin {
      from { transform: scale(0.5) rotate(-20deg); }
      to   { transform: scale(1) rotate(0deg); }
    }

    .bubble-text {
      position: absolute; z-index: 6;
      bottom: calc(50% - 100px);
      color: rgba(245,194,48,0.6);
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.4s ease 0.25s;
    }

    #bubble-overlay.active .bubble-text { opacity: 1; }

    .particle-canvas {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 4;
    }
  </style>
</head>
<body>

<!-- BURBUJA OVERLAY -->
<div id="bubble-overlay">
  <div class="bubble-bg"></div>
  <div class="bubble-flash" id="bubble-flash"></div>
  <canvas class="particle-canvas" id="particle-canvas"></canvas>
  <div class="bubble-ring" id="bubble-ring">
    <img src="/static/img/logo1.png" class="bubble-logo" alt="">
  </div>
  <div class="bubble-text">Ingresando <span style="margin-left:8px;letter-spacing:3px">• • •</span></div>
</div>

<!-- LOGIN CARD -->
<div class="login-box" id="login-box">
  <div class="login-logo">
    <img src="/static/img/logo1.png" alt="ALITOS" class="login-logo-img">
    <span class="login-brand">ALITOS</span>
    <span class="login-sub">Punto de Venta</span>
  </div>

  <div class="error-msg" id="error-msg">Usuario o contraseña incorrectos</div>

  <div class="form-group">
    <label class="form-label">Usuario</label>
    <input class="form-control" type="text" id="username" placeholder="tu usuario" autocomplete="username" autocapitalize="off">
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <input class="form-control" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="btn-login" onclick="doLogin()">Ingresar</button>

  <div class="login-footer">ALITOS Alfajores Premium &reg; 2026</div>
</div>

<script>
  // Enter para loguear
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // ── Partículas doradas ──────────────────────────────────
  const canvas = document.getElementById('particle-canvas');
  const ctx    = canvas.getContext('2d');
  let particles = [], animFrame;

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const CX = () => canvas.width / 2;
  const CY = () => canvas.height / 2;

  const COLORS = ['#F5C230','#C47820','#ffd700','#e8a020','#fff0a0','#d4920a','#ffe066'];

  function createParticles(count = 72) {
    particles = [];
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
      const speed = 5 + Math.random() * 12;
      particles.push({
        x: CX(), y: CY(),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 3 + Math.random() * 6,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: 1,
        decay: 0.012 + Math.random() * 0.02,
        gravity: 0.18 + Math.random() * 0.1,
        spin: (Math.random() - 0.5) * 0.3,
        spark: Math.random() > 0.6,
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.alpha <= 0) return;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.97; p.alpha -= p.decay;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      if (p.spark) {
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.rotate(Math.atan2(p.vy, p.vx) + p.spin);
        ctx.beginPath(); ctx.ellipse(0, 0, p.size * 2.5, p.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.restore();
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = Math.max(0, p.alpha * 0.3);
      ctx.shadowColor = p.color; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    });
    ctx.globalAlpha = 1;
    if (alive) animFrame = requestAnimationFrame(drawParticles);
  }

  function activarBurbuja(callback) {
    const overlay = document.getElementById('bubble-overlay');
    const ring    = document.getElementById('bubble-ring');
    const flash   = document.getElementById('bubble-flash');
    overlay.style.opacity = '1';
    overlay.classList.add('active');
    setTimeout(() => { createParticles(72); drawParticles(); ring.classList.add('pop'); }, 380);
    setTimeout(() => {
      flash.style.transition = 'opacity 0.08s ease'; flash.style.opacity = '1';
      setTimeout(() => { flash.style.transition = 'opacity 0.4s ease'; flash.style.opacity = '0'; }, 80);
    }, 400);
    setTimeout(callback, 1100);
  }

  // ── Login contra API ────────────────────────────────────
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error-msg');
    const btn      = document.getElementById('btn-login');

    if (!username || !password) { errEl.classList.add('show'); errEl.textContent = 'Completá usuario y contraseña'; return; }

    btn.textContent = '✦ Verificando...'; btn.style.opacity = '0.7'; btn.disabled = true;
    errEl.classList.remove('show');
    document.body.classList.add('portal-launching');

    try {
      const res = await fetch('/api/mobile/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) {
        document.body.classList.remove('portal-launching');
        btn.textContent = 'Ingresar'; btn.style.opacity = '1'; btn.disabled = false;
        errEl.textContent = 'Usuario o contraseña incorrectos';
        errEl.classList.add('show');
        return;
      }

      const data = await res.json();
      localStorage.setItem('pos_token', data.access_token);
      localStorage.setItem('pos_user', JSON.stringify({ id: data.user_id, nombre: data.nombre, rol: data.rol }));

      activarBurbuja(() => { window.location.href = '/pos/app'; });

    } catch(e) {
      document.body.classList.remove('portal-launching');
      btn.textContent = 'Ingresar'; btn.style.opacity = '1'; btn.disabled = false;
      errEl.textContent = 'Error de conexión — verificá la red';
      errEl.classList.add('show');
    }
  }
</script>
</body>
</html>
