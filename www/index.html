<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Alito's Mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:       #ede3d4;
      --card:     #ffffff;
      --elevated: #f5ece0;
      --border:   #d5c4a8;
      --border-hi:#b8a480;
      --text:     #1c1510;
      --muted:    #7a6848;
      --dim:      #a89878;
      --success:  #1a6b30;
      --warning:  #9a6800;
      --danger:   #b83228;
      --info:     #1a5090;
      --gold:     #7a5818;
      --accent:   #2a1e0e;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; font-size: 14px; line-height: 1.5; }

    /* ── LOGIN ────────────────────────────────────────────── */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background: linear-gradient(160deg, #f5e8d0 0%, #ede3d4 60%, #e0d0ba 100%);
    }
    .login-logo { width: 130px; height: auto; margin-bottom: 6px; filter: drop-shadow(0 4px 16px rgba(122,88,24,.2)); }
    .login-brand { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 2px; }
    .login-sub { color: var(--muted); font-size: 12px; margin-bottom: 28px; letter-spacing: .4px; text-transform: uppercase; }

    .login-box {
      background: #ffffff; border: 1px solid var(--border);
      border-radius: 22px; padding: 28px 24px; width: 100%; max-width: 340px;
      box-shadow: 0 4px 24px rgba(42,30,14,.12);
    }

    /* saved-user welcome */
    .saved-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #c47820, #8a5510);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
      margin: 0 auto 10px; letter-spacing: -1px;
      box-shadow: 0 0 0 3px rgba(196,120,32,.2);
    }
    .saved-name { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 2px; }
    .saved-role-label { text-align: center; font-size: 11px; color: var(--gold); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 20px; }
    .btn-biometric {
      width: 100%; padding: 14px 12px; border-radius: 12px; border: 1px solid rgba(196,120,32,.35);
      background: rgba(196,120,32,.08); color: var(--gold); font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 10px; transition: background .15s;
    }
    .btn-biometric:active { background: rgba(196,120,32,.18); }
    .btn-biometric svg { width: 22px; height: 22px; stroke: var(--gold); fill: none; stroke-width: 1.6; flex-shrink: 0; }
    .btn-cambiar-user { width: 100%; padding: 8px; background: none; border: none; color: var(--dim); font-size: 12px; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .btn-cambiar-user:active { color: var(--muted); }

    /* form fields */
    .field-label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field-wrap { position: relative; margin-bottom: 14px; }
    .field-input {
      width: 100%; padding: 12px 14px; background: var(--elevated); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px; outline: none; font-family: inherit;
    }
    .field-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(122,88,24,.1); }
    .btn-eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; }
    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; margin-top: -4px; }
    .remember-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--gold); cursor: pointer; }
    .remember-row label { font-size: 12px; color: var(--muted); cursor: pointer; user-select: none; }
    .btn-primary {
      width: 100%; padding: 13px; background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
      border: none; border-radius: 10px; cursor: pointer; font-family: inherit; transition: background .15s;
      letter-spacing: .2px;
    }
    .btn-primary:active { background: #1a1208; }
    .login-err { color: var(--danger); font-size: 12px; text-align: center; margin-top: 12px; display: none; }

    /* ── DARK MODE ────────────────────────────────────────── */
    html.dark {
      --bg: #0a0a0a; --card: #141414; --elevated: #1c1c1c; --border: #2a2a2a;
      --border-hi: #525252; --text: #f0f0f0; --muted: #a3a3a3; --dim: #6b6b6b;
      --success: #22c55e; --warning: #f59e0b; --danger: #ef4444;
      --gold: #c47820; --accent: #c47820;
    }
    html.dark .login-screen-inner { background: #0d0a06; }
    html.dark .login-box { background: #141414; border-color: #2a2a2a; box-shadow: 0 4px 24px rgba(0,0,0,.5); }
    html.dark .field-input { background: #1c1c1c; border-color: #2a2a2a; color: #f0f0f0; }
    html.dark .field-input:focus { border-color: #c47820; box-shadow: 0 0 0 3px rgba(196,120,32,.1); }
    html.dark .btn-primary { background: #c47820; }
    html.dark .btn-primary:active { background: #a06010; }
    html.dark .topbar { background: #0a0a0a; border-bottom: 1px solid #2a2a2a; }
    html.dark .sheet-box { background: #141414; }

    /* ── APP SHELL ────────────────────────────────────────── */
    #app-screen { display: none; flex-direction: column; min-height: 100vh; }
    .topbar {
      background: var(--accent); border-bottom: none;
      padding: 0 14px; height: 50px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 20;
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-logo { height: 26px; width: auto; filter: brightness(0) invert(1); }
    .role-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-user { font-size: 12px; color: rgba(255,255,255,.8); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-dark-toggle { background: rgba(255,255,255,.15); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn-dark-toggle svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .btn-logout { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 5px 11px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn-logout:active { background: rgba(255,255,255,.3); }

    /* ── TABS (bottom nav) ────────────────────────────────── */
    .tabs {
      display: flex; background: var(--card); border-top: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1; min-width: 56px; padding: 8px 4px 6px; background: none; border: none; border-top: 2px solid transparent;
      color: var(--muted); font-size: 10px; font-weight: 600; cursor: pointer; white-space: nowrap;
      display: flex; flex-direction: column; align-items: center; gap: 3px; font-family: inherit;
    }
    .tab-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .tab-btn.active { color: var(--accent); border-top-color: var(--accent); }

    /* ── CONTENT ──────────────────────────────────────────── */
    .tab-content { display: none; padding: 14px 14px 80px; flex: 1; }
    .tab-content.active { display: block; }

    /* ── KPI GRID ─────────────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; }
    .kpi-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .kpi-value { font-size: 22px; font-weight: 800; color: var(--text); }
    .kpi-value.gold { color: var(--gold); }

    /* ── SEARCH ───────────────────────────────────────────── */
    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--muted); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
    .search-input {
      width: 100%; padding: 9px 12px 9px 34px; background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    }
    .search-input:focus { border-color: var(--border-hi); }

    /* ── PRODUCTO CARDS ───────────────────────────────────── */
    .prod-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: border-color .15s;
    }
    .prod-card:active { border-color: var(--border-hi); }
    .prod-name { font-weight: 600; font-size: 14px; }
    .prod-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .prod-precio { font-weight: 700; font-size: 15px; color: var(--gold); }
    .btn-add-circle { background: var(--accent); color: #fff; border: none; border-radius: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    .btn-add-circle svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── CARRITO ──────────────────────────────────────────── */
    .carrito-header { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 8px; }
    .cart-item { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
    .cart-item-name { flex: 1; font-size: 13px; font-weight: 600; }
    .cart-item-total { font-size: 13px; font-weight: 700; color: var(--gold); min-width: 64px; text-align: right; }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-btn { background: var(--elevated); border: 1px solid var(--border); color: var(--text); width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: 700; }
    .qty-num { font-weight: 700; min-width: 18px; text-align: center; font-size: 13px; }

    /* ── TOTAL BAR ────────────────────────────────────────── */
    .total-bar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-top: 10px; display: flex; align-items: center; justify-content: space-between; }
    .total-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .total-val { font-size: 26px; font-weight: 800; color: var(--gold); }

    /* ── FORM OPCIONES ────────────────────────────────────── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .form-row.one { grid-template-columns: 1fr; }
    .sel, .inp {
      padding: 9px 10px; background: var(--elevated); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 13px; outline: none; font-family: inherit; width: 100%;
    }
    .sel:focus, .inp:focus { border-color: var(--border-hi); }
    .descuento-wrap { position: relative; }
    .descuento-prefix { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
    .descuento-inp { padding-left: 22px !important; }

    /* ── BOTONES ──────────────────────────────────────────── */
    .btn-cobrar { width: 100%; padding: 14px; background: var(--accent); color: #fff; font-weight: 800; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-family: inherit; }
    .btn-cobrar:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; }
    .btn-outline { width: 100%; padding: 10px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; margin-top: 6px; font-size: 12px; font-family: inherit; }
    .btn-outline:active { background: var(--elevated); color: var(--text); }
    .btn-dark { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-danger { background: var(--danger); color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

    /* ── TICKET / HISTORIAL ───────────────────────────────── */
    .ticket { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(42,30,14,.06); }
    .ticket-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 8px; }
    .ticket-num { font-weight: 800; font-size: 13px; color: var(--text); letter-spacing: .2px; }
    .ticket-total { font-weight: 800; font-size: 16px; color: var(--gold); }
    .ticket-meta { padding: 0 14px 10px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ticket-hora { font-size: 12px; color: var(--muted); font-weight: 500; }
    .pago-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: capitalize; letter-spacing: .2px; }
    .pago-efectivo { background: rgba(26,107,48,.12); color: var(--success); }
    .pago-transferencia { background: rgba(26,80,144,.12); color: var(--info); }
    .pago-cuenta_corriente { background: rgba(154,104,0,.12); color: var(--warning); }
    .ticket-items-btn { width: 100%; padding: 8px 14px; background: none; border: none; border-top: 1px dashed var(--border); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; letter-spacing: .3px; text-transform: uppercase; }
    .ticket-items-btn:active { background: var(--elevated); }
    .ticket-items-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; transition: transform .2s; }
    .ticket-items-btn.open svg { transform: rotate(180deg); }
    .ticket-detail { display: none; background: var(--elevated); padding: 10px 14px; }
    .ticket-detail.open { display: block; }
    .ticket-item-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .ticket-item-row:last-child { border-bottom: none; }
    .ticket-item-name { font-weight: 600; color: var(--text); }
    .ticket-item-qty { color: var(--muted); }
    .ticket-item-subtotal { font-weight: 700; color: var(--text); }
    .ticket-descuento { display: flex; justify-content: space-between; font-size: 11px; color: var(--danger); padding-top: 6px; border-top: 1px solid var(--border); margin-top: 4px; font-weight: 600; }

    /* ── HISTORIAL / PEDIDOS CARDS (legacy) ───────────────── */
    .list-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
    .list-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .list-num { font-weight: 700; font-size: 13px; }
    .list-amt { font-weight: 700; color: var(--gold); font-size: 14px; }
    .list-meta { font-size: 11px; color: var(--muted); }
    .list-detail { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; font-size: 12px; color: var(--muted); display: none; }
    .list-detail.open { display: block; }
    .estado-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .4px; }
    .estado-pendiente { background: rgba(245,158,11,.15); color: var(--warning); }
    .estado-confirmado { background: rgba(59,130,246,.15); color: var(--info); }
    .estado-en_preparacion { background: rgba(59,130,246,.15); color: var(--info); }
    .estado-listo { background: rgba(34,197,94,.1); color: var(--success); }
    .estado-entregado { background: rgba(34,197,94,.15); color: var(--success); }
    .estado-cancelado { background: rgba(239,68,68,.1); color: var(--danger); }

    /* ── PEDIDO FORM ──────────────────────────────────────── */
    .form-group { margin-bottom: 12px; }
    .form-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 8px; }
    .prod-pedido-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
    .prod-pedido-name { flex: 1; font-size: 13px; font-weight: 600; }
    .prod-pedido-qty { width: 64px; padding: 6px 8px; text-align: center; }
    .btn-remove { background: none; border: none; color: var(--danger); cursor: pointer; padding: 4px; }
    .btn-remove svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── MODAL ────────────────────────────────────────────── */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 28px 20px; width: 100%; max-width: 480px; text-align: center; }
    .modal-icon { margin-bottom: 10px; }
    .modal-icon svg { width: 52px; height: 52px; stroke: var(--success); fill: none; stroke-width: 1.5; }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .btn-modal-ok { width: 100%; padding: 12px; background: var(--accent); color: #fff; font-weight: 700; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-family: inherit; }

    /* ── CONFIG SECTION ───────────────────────────────────── */
    .config-section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
    .config-section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
    .config-section-title { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .config-section-title svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 1.8; }
    .config-section-body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
    .config-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--elevated); }
    .config-row:last-child { border-bottom: none; }
    .config-row-name { font-size: 13px; font-weight: 600; }
    .config-row-meta { font-size: 11px; color: var(--muted); }
    .config-row-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .badge-rol { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: var(--elevated); color: var(--gold); text-transform: uppercase; }
    .toggle-activo { width: 36px; height: 20px; background: var(--border); border-radius: 10px; position: relative; cursor: pointer; border: none; transition: background .2s; flex-shrink: 0; }
    .toggle-activo.on { background: var(--success); }
    .toggle-activo::after { content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: left .2s; }
    .toggle-activo.on::after { left: 18px; }
    .precio-edit { width: 80px; padding: 5px 8px; background: var(--elevated); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); text-align: right; font-family: inherit; outline: none; }
    .precio-edit:focus { border-color: var(--gold); }
    .btn-save-precio { padding: 5px 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* ── FINANZAS ─────────────────────────────────────────── */
    .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .fin-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 12px; }
    .fin-card.ganancia { border-color: var(--gold); background: linear-gradient(135deg, #fff 60%, #fdf5e6); }
    .fin-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
    .fin-val { font-size: 19px; font-weight: 800; color: var(--text); }
    .fin-val.pos { color: var(--success); }
    .fin-val.neg { color: var(--danger); }
    .fin-val.gold { color: var(--gold); }
    .fin-subtabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .fin-subtab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: none; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; font-family: inherit; }
    .fin-subtab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .compra-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .btn-nueva-compra { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 12px; font-family: inherit; }

    /* ── COMPRA FORM SHEET ────────────────────────────────── */
    .sheet-bg { position: fixed; inset: 0; background: rgba(42,30,14,.5); z-index: 50; display: none; align-items: flex-end; }
    .sheet-bg.open { display: flex; }
    .sheet-box { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; max-height: 85vh; overflow-y: auto; }
    .sheet-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }

    /* ── TOAST ────────────────────────────────────────────── */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none; max-width: 88vw; text-align: center; white-space: pre-wrap; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }
    .toast.info { background: var(--accent); color: #fff; }

    /* ── UTILS ────────────────────────────────────────────── */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
    .empty svg { width: 36px; height: 36px; stroke: var(--dim); fill: none; stroke-width: 1.5; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
    .spin { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-sep { height: 1px; background: var(--border); margin: 14px 0; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .chip { padding: 5px 10px; border-radius: 5px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .chip.active { background: var(--elevated); color: var(--text); border-color: var(--border-hi); }
  </style>
</head>

<script>
const API = 'https://projecto-alitos-production.up.railway.app';

// ── STATE ──────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('pos_token') || '';
let USER = JSON.parse(localStorage.getItem('pos_user') || 'null');
let productos = [];
let productosFiltered = [];
let carrito = [];
let clientesList = [];
let productosList = [];
let pedidoItems = [];

// ── SVG ICONS ──────────────────────────────────────────────────────────────
const ICONS = {
  cart:      `<svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`,
  history:   `<svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 0 .5-4.5"/><polyline points="3 3 3 7 7 7"/></svg>`,
  package:   `<svg viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
  dashboard: `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  clipboard: `<svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>`,
  truck:     `<svg viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  plus:      `<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  minus:     `<svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  x:         `<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  search:    `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
};

// ── API ────────────────────────────────────────────────────────────────────
function apiFetch(path, opts = {}) {
  return fetch(`${API}${path}`, {
    ...opts,
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
}

// ── AUTH ───────────────────────────────────────────────────────────────────
async function loginConDatos(username, password) {
  const r = await fetch(`${API}/api/mobile/login`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({username, password})
  });
  if (!r.ok) throw new Error('credenciales');
  const d = await r.json();
  TOKEN = d.access_token;
  USER = { id: d.user_id, username: d.username, nombre: d.nombre, rol: d.rol };
  localStorage.setItem('pos_token', TOKEN);
  localStorage.setItem('pos_user', JSON.stringify(USER));
  return d;
}

async function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value;
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!u || !p) { err.textContent = 'Completá usuario y contraseña'; err.style.display = 'block'; return; }
  try {
    await loginConDatos(u, p);
    const recordar = document.getElementById('chk-remember').checked;
    if (recordar) {
      localStorage.setItem('pos_saved_user', JSON.stringify({ username: u, password: btoa(p), nombre: USER.nombre, rol: USER.rol }));
      await intentarRegistrarBiometria();
    }
    iniciarApp();
  } catch { err.textContent = 'Usuario o contraseña incorrectos'; err.style.display = 'block'; }
}

async function doLoginGuardado() {
  const saved = JSON.parse(localStorage.getItem('pos_saved_user') || 'null');
  if (!saved) { mostrarFormLogin(); return; }
  const err = document.getElementById('login-err-saved');
  err.style.display = 'none';
  try {
    await loginConDatos(saved.username, atob(saved.password));
    iniciarApp();
  } catch { err.textContent = 'Error de conexión. Intentá de nuevo.'; err.style.display = 'block'; err.style.color = 'var(--danger)'; }
}

async function doLoginBiometric() {
  const ok = await verificarBiometria();
  if (ok) { await doLoginGuardado(); }
  else { showToast('Huella no reconocida', 'error'); }
}

// ── BIOMETRÍA (WebAuthn — funciona en APK y Chrome HTTPS) ──────────────────
const WA_RP_ID = location.hostname || 'localhost';

async function biometricDisponible() {
  if (!window.PublicKeyCredential) return false;
  try { return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable(); }
  catch { return false; }
}

async function intentarRegistrarBiometria() {
  if (!await biometricDisponible()) return;
  try {
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const uid = new TextEncoder().encode(String(USER.id));
    const cred = await navigator.credentials.create({ publicKey: {
      challenge, rp: { id: WA_RP_ID, name: 'ALITOS' },
      user: { id: uid, name: USER.username, displayName: USER.nombre },
      pubKeyCredParams: [{ alg: -7, type: 'public-key' }, { alg: -257, type: 'public-key' }],
      authenticatorSelection: { userVerification: 'required', authenticatorAttachment: 'platform' },
      timeout: 30000,
    }});
    const rawId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    localStorage.setItem('pos_biometric_id', rawId);
    showToast('Huella configurada', 'success');
  } catch { /* usuario canceló o no soportado */ }
}

async function verificarBiometria() {
  const credIdStr = localStorage.getItem('pos_biometric_id');
  if (!credIdStr || !await biometricDisponible()) return false;
  try {
    const credId = Uint8Array.from(atob(credIdStr), c => c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({ publicKey: {
      challenge, rpId: WA_RP_ID,
      allowCredentials: [{ id: credId, type: 'public-key' }],
      userVerification: 'required', timeout: 30000,
    }});
    return true;
  } catch { return false; }
}

function mostrarFormLogin() {
  document.getElementById('login-saved').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
}

function doLogout() {
  localStorage.removeItem('pos_token'); localStorage.removeItem('pos_user');
  TOKEN = ''; USER = null; carrito = []; pedidoItems = [];
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  initLoginScreen();
}

function togglePass() {
  const inp = document.getElementById('inp-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('inp-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function initLoginScreen() {
  const saved = JSON.parse(localStorage.getItem('pos_saved_user') || 'null');
  if (saved) {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('login-saved').style.display = 'block';
    const iniciales = (saved.nombre || saved.username).split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('saved-avatar').textContent = iniciales;
    document.getElementById('saved-name').textContent = saved.nombre || saved.username;
    const ROL_LABELS_L = { admin:'Admin', vendedor:'Vendedor', repartidor:'Repartidor', tomador:'Tomador', tomador_pedidos:'Tomador' };
    document.getElementById('saved-role-label').textContent = ROL_LABELS_L[saved.rol] || saved.rol || '';
    const bioDisp = await biometricDisponible();
    const hasCred = !!localStorage.getItem('pos_biometric_id');
    if (bioDisp && hasCred) {
      document.getElementById('btn-biometric').style.display = 'flex';
      // Auto-prompt biometric after brief delay so the user sees the screen
      setTimeout(() => doLoginBiometric(), 600);
    }
  } else {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('login-saved').style.display = 'none';
  }
}

// ── INIT ───────────────────────────────────────────────────────────────────
const ROL_LABELS = { admin: 'Admin', vendedor: 'Vendedor', repartidor: 'Repartidor', tomador: 'Tomador', tomador_pedidos: 'Tomador' };
const ICONS_EXTRA = {
  finance: `<svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
  settings:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  accounts:`<svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`,
};
const ROL_TABS = {
  admin:           [['dashboard','Inicio',ICONS.dashboard], ['venta','Venta',ICONS.cart], ['historial','Historial',ICONS.history], ['stock','Stock',ICONS.package], ['finanzas','Finanzas',ICONS_EXTRA.finance], ['cuentas','Cuentas',ICONS_EXTRA.accounts], ['config','Config',ICONS_EXTRA.settings]],
  vendedor:        [['venta','Venta',ICONS.cart], ['historial','Historial',ICONS.history]],
  repartidor:      [['entregas','Entregas',ICONS.truck], ['historial','Historial',ICONS.history]],
  tomador:         [['pedidos-new','Nuevo Pedido',ICONS.clipboard], ['pedidos','Pedidos',ICONS.clipboard]],
  tomador_pedidos: [['pedidos-new','Nuevo Pedido',ICONS.clipboard], ['pedidos','Pedidos',ICONS.clipboard]],
};

function iniciarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  const rol = USER.rol || 'vendedor';
  document.getElementById('role-badge').textContent = ROL_LABELS[rol] || rol;
  document.getElementById('topbar-user').textContent = USER.nombre || USER.username;
  buildTabs(rol);
}

function buildTabs(rol) {
  const tabs = ROL_TABS[rol] || ROL_TABS['vendedor'];
  const bar = document.getElementById('tabs-bar');
  const content = document.getElementById('tabs-content');
  bar.innerHTML = tabs.map(([id, label, icon], i) =>
    `<button class="tab-btn${i===0?' active':''}" onclick="switchTab('${id}')" data-tab="${id}">${icon}<span>${label}</span></button>`
  ).join('');
  content.innerHTML = tabs.map(([id]) => `<div id="tab-${id}" class="tab-content${id===tabs[0][0]?' active':''}"></div>`).join('');
  loadTab(tabs[0][0]);
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  loadTab(name);
}

function loadTab(name) {
  const el = document.getElementById(`tab-${name}`);
  if (!el) return;
  if (name === 'dashboard')   renderDashboard(el);
  if (name === 'venta')       renderVenta(el);
  if (name === 'historial')   renderHistorial(el);
  if (name === 'stock')       renderStock(el);
  if (name === 'entregas')    renderEntregas(el);
  if (name === 'pedidos-new') renderPedidosNew(el);
  if (name === 'pedidos')     renderPedidosList(el);
  if (name === 'finanzas')    renderFinanzas(el);
  if (name === 'cuentas')     renderCuentas(el);
  if (name === 'config')      renderConfig(el);
}

// ── DARK MODE ──────────────────────────────────────────────────────────────
function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('pos_dark', isDark ? '1' : '0');
  const icon = document.getElementById('icon-dark');
  if (icon) icon.innerHTML = isDark
    ? `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`
    : `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
}
if (localStorage.getItem('pos_dark') === '1') {
  document.documentElement.classList.add('dark');
  const icon = document.getElementById('icon-dark');
  if (icon) icon.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────
async function renderDashboard(el) {
  el.innerHTML = `<div class="empty"><div class="spin"></div></div>`;
  try {
    const d = await (await apiFetch('/pos/api/dashboard')).json();
    el.innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Ventas hoy</div><div class="kpi-value">${d.ventas_hoy}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total hoy</div><div class="kpi-value gold">$${fmt(d.total_hoy)}</div></div>
        <div class="kpi-card"><div class="kpi-label">Stock alfajores</div><div class="kpi-value">${d.stock_alfajores}</div></div>

async function cargarProductos() {
  const el = document.getElementById('prod-list');
  if (!el) return;
  el.innerHTML = `<div class="empty"><div class="spin"></div></div>`;
  try {
    const r = await apiFetch('/pos/api/stock');
    productos = await r.json();
    productosFiltered = productos;
    pintarProductos(productos);
  } catch { el.innerHTML = emptyState('Error cargando productos'); }
}

function filtrarProductos(q) {
  productosFiltered = q ? productos.filter(p => p.nombre.toLowerCase().includes(q.toLowerCase())) : productos;
  pintarProductos(productosFiltered);
}

function pintarProductos(lista) {
  const el = document.getElementById('prod-list');
  if (!el) return;
  if (!lista.length) { el.innerHTML = emptyState('Sin stock disponible'); return; }
  el.innerHTML = lista.map(p => `
    <div class="prod-card" onclick="addToCart(${p.lote_id})">
      <div>
        <div class="prod-name">${p.nombre}</div>
        <div class="prod-meta">Stock: ${p.stock} u · Lote ${p.numero_lote || p.lote_id}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="prod-precio">$${fmt(p.precio)}</div>
        <button class="btn-add-circle" onclick="event.stopPropagation();addToCart(${p.lote_id})">${ICONS.plus}</button>
      </div>
    </div>
  `).join('');
}

function addToCart(loteId) {
  const prod = productos.find(p => p.lote_id === loteId);
  if (!prod) return;
  const ex = carrito.find(i => i.lote_id === loteId);
  if (ex) {
    if (ex.qty >= prod.stock) { toast('Sin stock suficiente', 'error'); return; }
    ex.qty++;
  } else {
    carrito.push({ lote_id: loteId, nombre: prod.nombre, qty: 1, precio: prod.precio, max: prod.stock });
  }
  pintarCarrito();
  toast(prod.nombre, 'info', 1200);
}

function cambiarQty(loteId, delta) {
  const item = carrito.find(i => i.lote_id === loteId);
  if (!item) return;
  item.qty = Math.max(0, Math.min(item.max, item.qty + delta));
  if (item.qty === 0) carrito = carrito.filter(i => i.lote_id !== loteId);
  pintarCarrito();
}

function pintarCarrito() {
  const area = document.getElementById('carrito-area');
  const itemsEl = document.getElementById('carrito-items');
  const totalEl = document.getElementById('total-val');
  if (!area) return;
  area.style.display = carrito.length ? 'block' : 'none';
  if (!carrito.length) return;
  const desc = parseFloat(document.getElementById('inp-desc')?.value || 0) || 0;
  const bruto = carrito.reduce((s, i) => s + i.qty * i.precio, 0);
  const total = Math.max(0, bruto - desc);
  totalEl.textContent = '$' + fmt(total);
  itemsEl.innerHTML = carrito.map(i => `
    <div class="cart-item">
      <div class="cart-item-name">${i.nombre}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="cambiarQty(${i.lote_id},-1)">${ICONS.minus}</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="cambiarQty(${i.lote_id},1)">${ICONS.plus}</button>
      </div>
      <div class="cart-item-total">$${fmt(i.qty * i.precio)}</div>
    </div>
  `).join('');
}

function vaciarCarrito() { carrito = []; pintarCarrito(); document.getElementById('carrito-area').style.display = 'none'; }

function toggleEnvases() {
  const p = document.getElementById('envases-panel');
  if (p) p.style.display = p.style.display === 'none' ? 'block' : 'none';
}

function _getEnvases() {
  const envases = [
    ['Bolsa chica', 'env-bolsa-chica'], ['Bolsa mediana', 'env-bolsa-med'],
    ['Bolsa camiseta', 'env-bolsa-cam'], ['Caja chica', 'env-caja-chica'],
    ['Caja grande', 'env-caja-grande'],
  ];
  return envases.filter(([, id]) => parseInt(document.getElementById(id)?.value || 0) > 0)
    .map(([label, id]) => `${label}: ${document.getElementById(id).value}`).join(', ');
}

async function confirmarVenta() {
  if (!carrito.length) return;
  const btn = document.getElementById('btn-cobrar');
  btn.disabled = true; btn.textContent = 'Procesando...';
  const desc = parseFloat(document.getElementById('inp-desc')?.value || 0) || 0;
  const envases = _getEnvases();
  const notas = `POS — ${USER?.username || ''}${envases ? ' | Envases: ' + envases : ''}`;
  const payload = {
    items: carrito.map(i => ({ lote_id: i.lote_id, cantidad: i.qty, precio_unitario: i.precio })),
    forma_pago: document.getElementById('sel-pago').value,
    descuento: desc,
    notas,
  };
  try {
    const r = await apiFetch('/pos/api/venta', { method: 'POST', body: JSON.stringify(payload) });
    const data = await r.json();
    if (!r.ok) throw new Error(Array.isArray(data.detail) ? data.detail.map(d => d.msg || JSON.stringify(d)).join(', ') : (data.detail || 'Error'));
    const total = Math.max(0, carrito.reduce((s,i) => s + i.qty * i.precio, 0) - desc);
    carrito = [];
    pintarCarrito();
    abrirModal('¡Venta registrada!', `${data.numero_factura} · $${fmt(total)} · ${payload.forma_pago}${envases ? '\n📦 ' + envases : ''}`);
    cargarProductos();
  } catch (e) { showToast(e.message || 'Error al registrar', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Cobrar'; }
}

async function renderPedidosNew(el) {
  el.innerHTML = `<div class="empty"><div class="spin"></div></div>`;
  try {
    const [cls, prods] = await Promise.all([
      apiFetch('/pos/api/clientes').then(r => r.json()),
      apiFetch('/pos/api/productos').then(r => r.json()),
    ]);
    clientesList = cls;
    productosList = prods;
    pedidoItems = [];
    el.innerHTML = `
      <div class="form-group">
        <label class="field-label">Cliente</label>
        <select class="sel" id="ped-cliente" style="width:100%">
          <option value="">— Seleccioná cliente —</option>
          ${cls.map(c => `<option value="${c.id}">${c.nombre}${c.tipo !== 'minorista' ? ` (${c.tipo})` : ''}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="field-label">Fecha de entrega</label>
        <input class="inp" type="datetime-local" id="ped-fecha" style="width:100%">
      </div>
      <div class="form-group">
        <label class="field-label">Notas</label>
        <input class="inp" type="text" id="ped-notas" placeholder="Observaciones..." style="width:100%">
      </div>
      <div class="form-section-title">Productos</div>
      <select class="sel" id="ped-prod-sel" style="width:100%;margin-bottom:8px" onchange="agregarProdPedido()">
        <option value="">+ Agregar producto</option>
        ${prods.map(p => `<option value="${p.id}" data-precio="${p.precio}">${p.nombre} — $${fmt(p.precio)}</option>`).join('')}
      </select>
      <div id="ped-items"></div>
      <div class="total-bar" id="ped-total" style="display:none">
        <div class="total-label">Total estimado</div>
        <div class="total-val" id="ped-total-val">$0</div>
      </div>
      <button class="btn-cobrar" id="btn-ped" onclick="enviarPedido()">Crear pedido</button>
    `;
  } catch { el.innerHTML = emptyState('Error cargando datos'); }
}

function agregarProdPedido() {
  const sel = document.getElementById('ped-prod-sel');
  const id = parseInt(sel.value);
  if (!id) return;
  const opt = sel.options[sel.selectedIndex];
  const precio = parseFloat(opt.dataset.precio || 0);
  const nombre = opt.text.split(' — ')[0];
  const ex = pedidoItems.find(i => i.producto_id === id);
  if (ex) { ex.cantidad++; }
  else { pedidoItems.push({ producto_id: id, nombre, precio, cantidad: 1 }); }
  sel.value = '';
  pintarPedidoItems();
}

function cambiarCantPed(id, delta) {
  const item = pedidoItems.find(i => i.producto_id === id);
  if (!item) return;
  item.cantidad = Math.max(0, item.cantidad + delta);
  if (item.cantidad === 0) pedidoItems = pedidoItems.filter(i => i.producto_id !== id);
  pintarPedidoItems();
}

function pintarPedidoItems() {
  const el = document.getElementById('ped-items');
  const totEl = document.getElementById('ped-total');
  const totVal = document.getElementById('ped-total-val');
  if (!el) return;
  if (!pedidoItems.length) { el.innerHTML = ''; if (totEl) totEl.style.display = 'none'; return; }
  const total = pedidoItems.reduce((s, i) => s + i.cantidad * i.precio, 0);
  if (totEl) { totEl.style.display = 'flex'; totVal.textContent = '$' + fmt(total); }
  el.innerHTML = pedidoItems.map(i => `
    <div class="prod-pedido-row">
      <div class="prod-pedido-name">${i.nombre}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="cambiarCantPed(${i.producto_id},-1)">${ICONS.minus}</button>
        <span class="qty-num">${i.cantidad}</span>
        <button class="qty-btn" onclick="cambiarCantPed(${i.producto_id},1)">${ICONS.plus}</button>
      </div>
      <div style="min-width:58px;text-align:right;font-size:12px;color:var(--gold);font-weight:700">$${fmt(i.cantidad*i.precio)}</div>
    </div>
  `).join('');
}

async function enviarPedido() {
  const clienteId = parseInt(document.getElementById('ped-cliente').value);
  if (!clienteId) { toast('Seleccioná un cliente', 'error'); return; }
  if (!pedidoItems.length) { toast('Agregá al menos un producto', 'error'); return; }
  const btn = document.getElementById('btn-ped');
  btn.disabled = true; btn.textContent = 'Creando...';
  const payload = {
    cliente_id: clienteId,
    fecha_entrega: document.getElementById('ped-fecha').value || null,
    notas: document.getElementById('ped-notas').value || null,
    items: pedidoItems.map(i => ({ producto_id: i.producto_id, cantidad: i.cantidad, precio_unitario: i.precio })),
  };
  try {
    const r = await apiFetch('/pos/api/pedido', { method: 'POST', body: JSON.stringify(payload) });
    const data = await r.json();
    if (!r.ok) throw new Error(Array.isArray(data.detail) ? data.detail.map(d => d.msg || JSON.stringify(d)).join(', ') : (data.detail || 'Error'));
    pedidoItems = [];
    abrirModal('¡Pedido creado!', `${data.numero_pedido} · $${fmt(data.total_estimado)}`);
    renderPedidosNew(document.getElementById('tab-pedidos-new'));
  } catch (e) { toast(e.message || 'Error al crear pedido', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Crear pedido'; }
}

// ── TOAST ──────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg, type = 'info', ms = 2500) {
  const t = document.getElementById('toast');
  clearTimeout(_toastTimer);
  t.textContent = msg; t.className = `toast ${type} show`;
  _toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 2}); }
function fmtFecha(s) { return new Date(s).toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit', year:'2-digit'}); }
function emptyState(msg) { return `<div class="empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${msg}</div>`; }

// ── FINANZAS ────────────────────────────────────────────────────────────────
let _finSubtab = 'hoy';
let _finData = {};

async function renderFinanzas(el) {
  el.innerHTML = `<div class="empty"><div class="spin"></div></div>`;
  try {
    const [hoyRes, mesRes, cRes] = await Promise.all([
      apiFetch('/pos/api/finanzas/hoy'),
      apiFetch('/pos/api/finanzas/resumen'),
      apiFetch('/pos/api/compras?limit=30'),
    ]);
    _finData = {
      hoy:    hoyRes.ok  ? await hoyRes.json()  : {},
      mes:    mesRes.ok  ? await mesRes.json()   : {},
      compras: cRes.ok   ? await cRes.json()     : [],
    };
    _renderFinContent(el);
  } catch { el.innerHTML = emptyState('Error al cargar finanzas'); }
}

function _renderFinContent(el) {
  const { hoy = {}, mes = {} } = _finData;
  el.innerHTML = `
    <div class="fin-subtabs">
      <button class="fin-subtab${_finSubtab==='hoy'?' active':''}"     onclick="_finTab('hoy',this)">Hoy</button>
      <button class="fin-subtab${_finSubtab==='mes'?' active':''}"     onclick="_finTab('mes',this)">Este mes</button>
      <button class="fin-subtab${_finSubtab==='compras'?' active':''}" onclick="_finTab('compras',this)">Compras</button>
    </div>
    <div id="fin-body"></div>
    ${_sheetCompraHTML()}
  `;
  _renderFinBody();
}

function _finTab(name, btn) {
  _finSubtab = name;
  document.querySelectorAll('.fin-subtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _renderFinBody();
}

function _renderFinBody() {
  const el = document.getElementById('fin-body');
  if (!el) return;
  const { hoy = {}, mes = {}, compras = [] } = _finData;

  if (_finSubtab === 'hoy') {
    const neto = (hoy.cobrado_total||0) - (hoy.gastos_hoy||0);
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
        <div class="fin-card" style="grid-column:1/-1">
          <div class="fin-label">Cobrado hoy</div>
          <div class="fin-val pos" style="font-size:26px">$${fmt(hoy.cobrado_total||0)}</div>
        </div>
        <div class="fin-card"><div class="fin-label">Efectivo</div><div class="fin-val" style="font-size:16px">$${fmt(hoy.efectivo||0)}</div></div>
        <div class="fin-card"><div class="fin-label">Digital</div><div class="fin-val" style="font-size:16px;color:var(--info)">$${fmt(hoy.transferencia||0)}</div></div>
        <div class="fin-card"><div class="fin-label">Fiado</div><div class="fin-val" style="font-size:16px;color:var(--warning)">$${fmt(hoy.fiado||0)}</div></div>
        <div class="fin-card"><div class="fin-label">Gastos</div><div class="fin-val neg" style="font-size:16px">$${fmt(hoy.gastos_hoy||0)}</div></div>
        <div class="fin-card ganancia"><div class="fin-label">Saldo neto</div><div class="fin-val ${neto>=0?'pos':'neg'}" style="font-size:16px">$${fmt(neto)}</div></div>
      </div>
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">Ventas de hoy (${(hoy.ventas||[]).length})</div>
      ${(hoy.ventas||[]).length === 0 ? emptyState('Sin ventas hoy') :
        (hoy.ventas||[]).map(v => `
          <div class="ticket">
            <div class="ticket-head">
              <div><div class="ticket-num">${v.numero_factura}</div><div class="ticket-hora">${v.hora}</div></div>
              <div style="text-align:right">
                <div class="ticket-total">$${fmt(v.total)}</div>
                <span class="pago-badge pago-${v.forma_pago}">${PAGO_LABEL[v.forma_pago]||v.forma_pago}</span>
              </div>
            </div>
          </div>`).join('')}
    `;
    return;
  }

  if (_finSubtab === 'mes') {
    const gan = (mes.ingresos||0) - (mes.costos||0) - (mes.gastos||0);
    el.innerHTML = `
      <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:10px;letter-spacing:.3px">${mes.mes||'Este mes'}</div>
      <div class="fin-grid">
        <div class="fin-card"><div class="fin-label">Ingresos</div><div class="fin-val pos">$${fmt(mes.ingresos||0)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${mes.cant_ventas||0} ventas</div></div>
        <div class="fin-card"><div class="fin-label">Costos insumos</div><div class="fin-val neg">$${fmt(mes.costos||0)}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${mes.cant_compras||0} compras</div></div>
        <div class="fin-card"><div class="fin-label">Gastos</div><div class="fin-val neg">$${fmt(mes.gastos||0)}</div></div>
        <div class="fin-card ganancia"><div class="fin-label">Ganancia real</div><div class="fin-val ${gan>=0?'pos':'neg'}">$${fmt(gan)}</div></div>
      </div>
      ${mes.cant_ventas > 0 ? `<div class="list-card" style="margin-top:4px"><div class="list-meta" style="font-size:12px">Ticket promedio: <strong>$${fmt((mes.ingresos||0)/(mes.cant_ventas||1))}</strong></div></div>` : ''}
    `;
    return;
  }

  // Compras
  el.innerHTML = `
    <button class="btn-nueva-compra" onclick="abrirSheetCompra()">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva compra de insumo
    </button>
    ${compras.length === 0 ? emptyState('Sin compras registradas') :
      compras.map(c => `
        <div class="ticket">
          <div class="ticket-head">
            <div><div class="ticket-num">${c.insumo_nombre}</div><div class="ticket-hora">${c.fecha} · ${c.cantidad} ${c.unidad}</div></div>
            <div style="text-align:right"><div class="ticket-total">$${fmt(c.total)}</div>${c.fuente ? `<div style="font-size:10px;color:var(--muted)">${c.fuente}</div>` : ''}</div>
          </div>
          ${c.proveedor ? `<div style="padding:0 14px 10px;font-size:11px;color:var(--muted)">Proveedor: ${c.proveedor}</div>` : ''}
          ${c.notas ? `<div style="padding:0 14px 10px;font-size:11px;color:var(--dim)">${c.notas}</div>` : ''}
        </div>`).join('')}
  `;
}
function _sheetCompraHTML() {
  return `
  <div class="sheet-bg" id="sheet-compra">
    <div class="sheet-box">
      <div class="sheet-title">Nueva compra de insumo</div>
      <div class="form-group">
        <label class="field-label">Insumo</label>
        <select class="sel" id="sc-insumo" style="width:100%"><option value="">Cargando...</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group">
          <label class="field-label">Cantidad</label>
          <input class="inp" type="number" id="sc-cantidad" placeholder="0" min="0.01" step="0.01">
        </div>
        <div class="form-group">
          <label class="field-label">Precio total ($)</label>
          <input class="inp" type="number" id="sc-precio" placeholder="0" min="0">
        </div>
      </div>
      <div class="form-group">
        <label class="field-label">Pagado con</label>
        <select class="sel" id="sc-fuente" style="width:100%">
          <option value="">Seleccionar...</option>
          <option value="Caja del negocio">💼 Caja del negocio (efectivo)</option>
          <option value="Dinero personal">🏠 Dinero personal (de mi casa)</option>
          <option value="Transferencia digital">📱 Transferencia digital</option>
          <option value="Tarjeta">💳 Tarjeta</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="field-label">Proveedor (opcional)</label>
        <input class="inp" type="text" id="sc-proveedor" placeholder="nombre del proveedor">
      </div>
      <div class="form-group">
        <label class="field-label">Notas (opcional)</label>
        <input class="inp" type="text" id="sc-notas" placeholder="ej. factura B 0012">
      </div>
      <button class="btn-dark" style="width:100%;margin-top:6px" onclick="guardarCompra()">Guardar compra</button>
      <button class="btn-outline" onclick="cerrarSheetCompra()">Cancelar</button>
    </div>
  </div>`;
}
async function abrirSheetCompra() {
  document.getElementById('sheet-compra').classList.add('open');
  const sel = document.getElementById('sc-insumo');
  if (sel.options.length <= 1) {
    const r = await apiFetch('/pos/api/insumos');
    if (r.ok) {
      const insumos = await r.json();
      sel.innerHTML = `<option value="">Seleccionar insumo...</option>` +
        insumos.map(i => `<option value="${i.id}" data-unidad="${i.unidad}">${i.nombre}</option>`).join('');
    }
  }
}
function cerrarSheetCompra() { document.getElementById('sheet-compra').classList.remove('open'); }
async function guardarCompra() {
  const insumo_id = parseInt(document.getElementById('sc-insumo').value);
  const cantidad = parseFloat(document.getElementById('sc-cantidad').value);
  const precio_total = parseFloat(document.getElementById('sc-precio').value);
  const fuente = document.getElementById('sc-fuente').value;
  const proveedor = document.getElementById('sc-proveedor').value.trim();
  const notasBase = document.getElementById('sc-notas').value.trim();
  if (!insumo_id || !cantidad || !precio_total) { showToast('Completá insumo, cantidad y precio', 'error'); return; }
  const notasCompleta = [fuente ? `Fuente: ${fuente}` : '', notasBase].filter(Boolean).join(' — ');
  try {
    const r = await apiFetch('/pos/api/compra', { method: 'POST', body: JSON.stringify({ insumo_id, cantidad, precio_total, proveedor, notas: notasCompleta || null }) });
    if (!r.ok) throw new Error();
    showToast('Compra registrada', 'success');
    cerrarSheetCompra();
    const tabEl = document.getElementById('tab-finanzas');
    if (tabEl) renderFinanzas(tabEl);
  } catch { showToast('Error al guardar', 'error'); }
}

// ── CONFIG ──────────────────────────────────────────────────────────────────
async function renderConfig(el) {
  el.innerHTML = `<div class="empty"><div class="spin"></div></div>`;
  try {
    const [uRes, pRes, cRes] = await Promise.all([
      apiFetch('/pos/api/usuarios'),
      apiFetch('/pos/api/productos'),
      apiFetch('/pos/api/clientes'),
    ]);
    const usuarios = uRes.ok ? await uRes.json() : [];
    const productos = pRes.ok ? await pRes.json() : [];
    const clientes = cRes.ok ? await cRes.json() : [];
    const ROL_COLOR = { admin:'#7a5818', vendedor:'#1a5090', repartidor:'#1a6b30', tomador:'#9a6800', tomador_pedidos:'#9a6800', produccion:'#6b1890' };
    el.innerHTML = `
      <!-- USUARIOS -->
      <div class="config-section">
        <div class="config-section-header" onclick="toggleSection(this)">
          <div class="config-section-title">
            <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Empleados (${usuarios.length})
          </div>
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" class="chevron"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="config-section-body" style="display:none">
          ${usuarios.map(u => `
            <div class="config-row">
              <div>
                <div class="config-row-name">${u.nombre}</div>
                <div class="config-row-meta">@${u.username}</div>
              </div>
              <div class="config-row-right">
                <span class="badge-rol" style="color:${ROL_COLOR[u.rol]||'var(--muted)'}">${u.rol}</span>
                <button class="toggle-activo${u.activo?' on':''}" onclick="toggleUsuario(${u.id},this)" title="${u.activo?'Desactivar':'Activar'}"></button>
              </div>
            </div>`).join('') || '<div class="list-meta" style="padding:10px 0">Sin empleados registrados</div>'}
        </div>
      </div>

      <!-- PRODUCTOS -->
      <div class="config-section">
        <div class="config-section-header" onclick="toggleSection(this)">
          <div class="config-section-title">
            <svg viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            Productos y precios (${productos.length})
          </div>
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" class="chevron"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="config-section-body" style="display:none">
          ${productos.map(p => `
            <div class="config-row">
              <div style="flex:1">
                <div class="config-row-name">${p.nombre}</div>
              </div>
              <div class="config-row-right">
                <span style="font-size:11px;color:var(--muted)">$</span>
                <input class="precio-edit" type="number" value="${p.precio}" id="precio-${p.id}" min="0" step="0.01">
                <button class="btn-save-precio" onclick="guardarPrecio(${p.id})">OK</button>
              </div>
            </div>`).join('') || '<div class="list-meta" style="padding:10px 0">Sin productos</div>'}
        </div>
      </div>

      <!-- CLIENTES -->
      <div class="config-section">
        <div class="config-section-header" onclick="toggleSection(this)">
          <div class="config-section-title">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Clientes (${clientes.length})
          </div>
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" fill="none" stroke-width="2" class="chevron"><polyline points="6 9 12 15 18 9"/></svg>

        <div class="config-section-body" style="display:none">
          ${clientes.map(c => `
            <div class="config-row">
              <div>
                <div class="config-row-name">${c.nombre}</div>
                <div class="config-row-meta">${c.tipo} · ${c.telefono||'Sin tel.'}</div>
              </div>
            </div>`).join('') || '<div class="list-meta" style="padding:10px 0">Sin clientes</div>'}
        </div>
      </div>

  } catch { el.innerHTML = emptyState('Error al cargar configuración'); }
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (chevron) chevron.style.transform = open ? '' : 'rotate(180deg)';
}

async function toggleUsuario(id, btn) {
  const activo = !btn.classList.contains('on');
  btn.classList.toggle('on');
  try {
    const r = await apiFetch(`/pos/api/usuario/${id}/activo`, { method: 'PATCH', body: JSON.stringify({ activo }) });
    if (!r.ok) { btn.classList.toggle('on'); showToast('Error al cambiar estado', 'error'); }
  } catch { btn.classList.toggle('on'); showToast('Error de conexión', 'error'); }
}

async function guardarPrecio(id) {
  const val = parseFloat(document.getElementById(`precio-${id}`).value);
  if (!val || val < 0) { showToast('Precio inválido', 'error'); return; }
  try {
    const r = await apiFetch(`/pos/api/producto/${id}/precio`, { method: 'PATCH', body: JSON.stringify({ precio: val }) });
    if (r.ok) { showToast('Precio actualizado', 'success'); }
    else { showToast('Error al guardar precio', 'error'); }
  } catch { showToast('Error de conexión', 'error'); }
}

// ── CUENTAS CORRIENTES ──────────────────────────────────────────────────────
async function renderCuentas(el) {
  el.innerHTML = `<div class="empty"><div class="spin"></div></div>`;
  try {
    const res = await apiFetch('/pos/api/cuentas');
    if (!res.ok) throw new Error();
    const cuentas = await res.json();
    const totalDeuda = cuentas.reduce((s, c) => s + c.saldo, 0);
    if (!cuentas.length) {
      el.innerHTML = `
        <div class="fin-card" style="margin-bottom:12px;text-align:center">
          <div class="fin-label">Total en cuenta corriente</div>
          <div class="fin-val pos" style="font-size:26px">$0</div>
        </div>
        ${emptyState('Sin deudas pendientes')}`;
      return;
    }
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted)">Total en cta. corriente</div>
          <div style="font-size:24px;font-weight:800;color:var(--warning)">$${fmt(totalDeuda)}</div>
        </div>
        <button class="btn-outline" style="width:auto;padding:5px 12px;font-size:11px" onclick="renderCuentas(document.getElementById('tab-cuentas'))">↻</button>
      </div>
      ${cuentas.map(c => `
        <div class="ticket">
          <div class="ticket-head">
            <div>
              <div class="ticket-num">${c.cliente}</div>
              <div class="ticket-hora">${c.cant_ventas} venta${c.cant_ventas!==1?'s':''} sin cobrar · última: ${c.ultima_venta}</div>
            </div>
            <div style="text-align:right">
              <div class="ticket-total" style="color:var(--warning)">$${fmt(c.saldo)}</div>
              <span class="pago-badge pago-cuenta_corriente">Debe</span>
            </div>
          </div>
          <button class="ticket-items-btn" id="btn-cc-${c.cliente_id}" onclick="toggleTicket('cc-${c.cliente_id}')">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            Ver detalle de ventas
          </button>
          <div class="ticket-detail" id="det-cc-${c.cliente_id}">
            ${(c.ventas||[]).map(v => `
              <div class="ticket-item-row">
                <span class="ticket-item-name">${v.numero_factura}</span>
                <span class="ticket-item-qty">${v.hora}</span>
                <span class="ticket-item-subtotal">$${fmt(v.total)}</span>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    `;
  } catch { el.innerHTML = emptyState('Error al cargar cuentas'); }
}
